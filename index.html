<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;800&display=swap');

  .phone-gen-wrap {
    background: linear-gradient(135deg, #ffb3d9 0%, #ff85c2 40%, #ffcce0 100%);
    min-height: 600px;
    padding: 2rem 1.5rem;
    font-family: 'Nunito', sans-serif;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
  }

  .deco {
    position: absolute;
    font-size: 2.2rem;
    animation: float 4s ease-in-out infinite;
    user-select: none;
    pointer-events: none;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-5deg); }
    50% { transform: translateY(-14px) rotate(5deg); }
  }

  .title {
    font-family: 'Pacifico', cursive;
    font-size: 1.8rem;
    color: #8b005d;
    text-align: center;
    margin: 0 0 0.3rem;
    text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
  }

  .subtitle {
    text-align: center;
    color: #c2006b;
    font-size: 0.95rem;
    margin-bottom: 1.5rem;
    font-weight: 700;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .count-label {
    font-weight: 800;
    color: #8b005d;
    font-size: 0.95rem;
  }

  .count-input {
    width: 70px;
    padding: 6px 10px;
    border-radius: 50px;
    border: 2px solid #ff69b4;
    background: rgba(255,255,255,0.8);
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: #8b005d;
    text-align: center;
    outline: none;
  }

  .gen-btn {
    background: #d63384;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 32px;
    font-size: 1.1rem;
    font-family: 'Pacifico', cursive;
    cursor: pointer;
    box-shadow: 0 4px 0px #9b1e60;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
  }

  .gen-btn:hover {
    background: #c02070;
  }

  .gen-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0px #9b1e60;
  }

  .phone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 10px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .phone-card {
    background: rgba(255,255,255,0.85);
    border-radius: 14px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1.5px solid #ffadd6;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    cursor: pointer;
    transition: background 0.15s;
  }

  .phone-card:hover {
    background: rgba(255,255,255,1);
  }

  .phone-card.copied {
    background: #ffc0e8;
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .phone-icon {
    font-size: 1.3rem;
  }

  .phone-num {
    font-weight: 800;
    color: #8b005d;
    font-size: 0.92rem;
    letter-spacing: 0.5px;
    font-family: 'Nunito', sans-serif;
  }

  .copy-hint {
    font-size: 0.7rem;
    color: #c2006b;
    margin-left: auto;
    opacity: 0.7;
  }

  .empty-msg {
    text-align: center;
    color: #c2006b;
    font-weight: 700;
    font-size: 1rem;
    padding: 2rem;
    opacity: 0.7;
  }

  .stats-bar {
    text-align: center;
    font-size: 0.82rem;
    color: #9b1e60;
    font-weight: 700;
    margin-top: 1rem;
  }
</style>

<div class="phone-gen-wrap">
  <div class="deco" style="top: 10px; left: 20px; animation-delay: 0s;">🐱</div>
  <div class="deco" style="top: 8px; right: 25px; animation-delay: 0.5s;">🦝</div>
  <div class="deco" style="top: 55px; left: 5px; animation-delay: 1s; font-size:1.5rem;">🐱</div>
  <div class="deco" style="top: 60px; right: 8px; animation-delay: 1.5s; font-size:1.5rem;">🦝</div>
  <div class="deco" style="bottom: 20px; left: 15px; animation-delay: 0.7s;">🐾</div>
  <div class="deco" style="bottom: 18px; right: 20px; animation-delay: 1.2s;">🐾</div>
  <div class="deco" style="bottom: 60px; left: 40%; animation-delay: 0.3s; font-size:1.4rem;">🐱</div>

  <h1 class="title">Generatorul de Numere 🌸</h1>
  <p class="subtitle">🦝 Numere românești cu 07 • Pisici & Ratoni 🐱</p>

  <div class="controls">
    <span class="count-label">Câte numere?</span>
    <input class="count-input" type="number" id="countInput" value="10" min="1" max="50" />
    <button class="gen-btn" onclick="generateNumbers()">🌸 Generare 🌸</button>
  </div>

  <div class="phone-grid" id="phoneGrid">
    <div class="empty-msg">Apasă butonul de generare! 🐱</div>
  </div>

  <div class="stats-bar" id="statsBar"></div>
</div>

<script>
const prefixes = ['07200', '07210', '07230', '07310', '07320', '07400', '07410', '07420', '07430', '07480', '07490', '07600', '07610', '07620', '07630', '07640', '07650', '07700', '07710', '07720', '07730', '07740', '07750', '07760', '07770', '07800', '07810', '07820', '07830', '07840', '07850', '07860', '07870', '07880', '07900', '07910', '07920', '07930', '07940', '07950', '07960', '07970', '07980', '07990'];
const catIcons = ['🐱','🐾','🦝','😺','🐈','🦝','🐱','🐾'];

function randDigits(n) {
  let s = '';
  for (let i = 0; i < n; i++) s += Math.floor(Math.random() * 10);
  return s;
}

function formatPhone(raw) {
  return raw.slice(0,4) + ' ' + raw.slice(4,7) + ' ' + raw.slice(7,10);
}

function generateNumbers() {
  const count = Math.min(50, Math.max(1, parseInt(document.getElementById('countInput').value) || 10));
  const grid = document.getElementById('phoneGrid');
  const statsBar = document.getElementById('statsBar');
  grid.innerHTML = '';
  const numbers = [];

  for (let i = 0; i < count; i++) {
    const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
    const rest = randDigits(10 - prefix.length);
    const raw = prefix + rest;
    numbers.push(raw);

    const card = document.createElement('div');
    card.className = 'phone-card';
    card.style.animationDelay = (i * 0.04) + 's';
    const icon = catIcons[i % catIcons.length];
    card.innerHTML = `<span class="phone-icon">${icon}</span><span class="phone-num">${formatPhone(raw)}</span><span class="copy-hint">copiază</span>`;
    card.addEventListener('click', () => {
      navigator.clipboard.writeText(raw).catch(() => {});
      card.classList.add('copied');
      card.querySelector('.copy-hint').textContent = '✓ copiat!';
      setTimeout(() => {
        card.classList.remove('copied');
        card.querySelector('.copy-hint').textContent = 'copiază';
      }, 1500);
    });
    grid.appendChild(card);
  }

  statsBar.textContent = `✨ ${count} numere generate • Click pe un număr ca să-l copiezi! ✨`;
}

generateNumbers();
</script>
